name: E2E Tests & Allure Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: run tests in parallel per browser
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: Playwright E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false      # all browsers run even if one fails
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (${{ matrix.browser }})
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests
        # continue-on-error so we can upload artifacts before failing the job
        run: npx playwright test --project=${{ matrix.browser }}
        continue-on-error: true
        env:
          CI: true
        id: tests

      # Raw Allure XML — one artifact per browser, merged in the report job
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 5

      # Playwright traces are attached only on failure for debugging
      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: steps.tests.outcome == 'failure'
        with:
          name: playwright-traces-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

      # Fail the job AFTER artifacts are saved so CI badge is accurate
      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: merge results, generate report, write job summary, upload artifact
  # ─────────────────────────────────────────────────────────────────────────────
  report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: e2e
    # Always run so the report is generated even when tests fail
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Restore Allure history for trend / retry graphs ───────────────────────
      # History is stored as an artifact from the previous run so it works
      # without GitHub Pages and without any external service.
      - name: Download previous Allure history
        uses: actions/download-artifact@v4
        continue-on-error: true   # first run: artifact doesn't exist yet
        with:
          name: allure-history
          path: allure-results/history

      # ── Download and merge raw results from all three browser jobs ────────────
      - name: Download Allure results (chromium)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-chromium
          path: allure-results

      - name: Download Allure results (firefox)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-firefox
          path: allure-results

      - name: Download Allure results (webkit)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-webkit
          path: allure-results

      # ── Generate the Allure HTML report ───────────────────────────────────────
      - name: Generate Allure report
        run: npm run allure:generate

      # ── Persist history for the next run ─────────────────────────────────────
      # The history/ folder inside allure-report/ is saved as its own artifact
      # and downloaded at the start of the next run (step above).
      - name: Save Allure history for next run
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-history
          path: allure-report/history/
          retention-days: 90

      # ── Upload the full rendered HTML report as a downloadable artifact ───────
      - name: Upload Allure HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      # ── Write a rich Job Summary visible directly in the Actions UI ───────────
      # No external service required — the summary is always readable at
      #   Actions → <run> → Summary
      # without downloading anything.
      - name: Write Job Summary
        if: always()
        run: |
          node - <<'EOF'
          const fs   = require('fs');
          const path = require('path');

          const dir = 'allure-results';
          const files = fs.readdirSync(dir).filter(f => f.endsWith('-result.json'));

          const results = files
            .map(f => { try { return JSON.parse(fs.readFileSync(path.join(dir, f), 'utf8')); } catch { return null; } })
            .filter(Boolean);

          const getLabel  = (r, name) => (r.labels || []).find(l => l.name === name)?.value || '—';
          const getParam  = (r, name) => (r.parameters || []).find(p => p.name === name)?.value || '—';
          const getBrowser = r => getParam(r, 'Project') !== '—' ? getParam(r, 'Project') : getLabel(r, 'parentSuite');

          // ── Per-browser stats ───────────────────────────────────────────────────
          const BROWSERS = ['chromium', 'firefox', 'webkit'];
          const byBrowser = {};
          for (const b of BROWSERS) {
            const br = results.filter(r => getBrowser(r) === b);
            byBrowser[b] = {
              passed:  br.filter(r => r.status === 'passed').length,
              failed:  br.filter(r => r.status === 'failed').length,
              broken:  br.filter(r => r.status === 'broken').length,
              skipped: br.filter(r => r.status === 'skipped').length,
              total:   br.length,
            };
          }

          const sum = key => BROWSERS.reduce((acc, b) => acc + byBrowser[b][key], 0);
          const totalPassed  = sum('passed');
          const totalFailed  = sum('failed');
          const totalBroken  = sum('broken');
          const totalSkipped = sum('skipped');
          const total        = results.length;
          const ok           = totalFailed + totalBroken === 0;

          const browserIcon = { chromium: '🟡', firefox: '🦊', webkit: '🍎' };
          const capitalize  = s => s.charAt(0).toUpperCase() + s.slice(1);

          let md = `## ${ok ? '✅' : '❌'} E2E Test Results — run #${process.env.GITHUB_RUN_NUMBER}\n\n`;

          // ── Summary table with per-browser rows ─────────────────────────────────
          md += `| Browser | ✅ Passed | ❌ Failed | 💥 Broken | ⏭ Skipped | Total |\n`;
          md += `|---------|----------|----------|----------|----------|-------|\n`;
          for (const b of BROWSERS) {
            const s = byBrowser[b];
            md += `| ${browserIcon[b]} ${capitalize(b)} | ${s.passed} | ${s.failed} | ${s.broken} | ${s.skipped} | ${s.total} |\n`;
          }
          md += `| **All** | **${totalPassed}** | **${totalFailed}** | **${totalBroken}** | **${totalSkipped}** | **${total}** |\n\n`;

          // ── Failed / Broken tests table with browser column ──────────────────────
          const failedTests = results.filter(r => r.status === 'failed' || r.status === 'broken');
          if (failedTests.length) {
            md += `### ❌ Failed / Broken Tests\n\n`;
            md += `| Browser | Test | Suite | Error |\n`;
            md += `|---------|------|-------|-------|\n`;
            failedTests.forEach(r => {
              const browser = getBrowser(r);
              const icon    = browserIcon[browser] || '🌐';
              const suite   = getLabel(r, 'suite');
              const msg     = (r.statusDetails?.message || '').replace(/\n/g, ' ').substring(0, 100);
              md += `| ${icon} ${capitalize(browser)} | ${r.name} | ${suite} | \`${msg}\` |\n`;
            });
            md += '\n';
          }

          const runUrl      = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
          const artifactUrl = `${runUrl}#artifacts`;
          md += `---\n\n`;
          md += `### 📦 Download & View Allure Report\n\n`;
          md += `[**⬇ Open this run's artifacts page**](${artifactUrl})\n\n`;
          md += `> ⚠️ **Do not open \`index.html\` directly** — browsers block \`fetch()\` on \`file://\` and the report will appear empty.\n`;
          md += `> Always serve the report through a local HTTP server.\n\n`;
          md += `\`\`\`bash\n`;
          md += `# 1. Download and unzip the allure-report artifact, then:\n\n`;
          md += `# Option A — if you have the project checked out (recommended):\n`;
          md += `cp -r /path/to/downloaded/allure-report ./allure-report\n`;
          md += `npm run allure:open          # starts a local server and opens the browser\n\n`;
          md += `# Option B — any machine with Node.js, no project needed:\n`;
          md += `npx serve /path/to/allure-report -l 8080\n`;
          md += `# then open http://localhost:8080\n\n`;
          md += `\`\`\`\n`;

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md);
          console.log('Job summary written.');
          EOF
