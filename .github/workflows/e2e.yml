name: E2E Tests & Allure Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: run tests in parallel per browser
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: Playwright E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false      # all browsers run even if one fails
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (${{ matrix.browser }})
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests
        # continue-on-error so we can upload artifacts before failing the job
        run: npx playwright test --project=${{ matrix.browser }}
        continue-on-error: true
        env:
          CI: true
        id: tests

      # Raw Allure XML — one artifact per browser, merged in the report job
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 5

      # Playwright traces are attached only on failure for debugging
      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: steps.tests.outcome == 'failure'
        with:
          name: playwright-traces-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

      # Fail the job AFTER artifacts are saved so CI badge is accurate
      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: merge results, generate report, write job summary, upload artifact
  # ─────────────────────────────────────────────────────────────────────────────
  report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: e2e
    # Always run so the report is generated even when tests fail
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Restore Allure history for trend / retry graphs ───────────────────────
      # History is stored as an artifact from the previous run so it works
      # without GitHub Pages and without any external service.
      - name: Download previous Allure history
        uses: actions/download-artifact@v4
        continue-on-error: true   # first run: artifact doesn't exist yet
        with:
          name: allure-history
          path: allure-results/history

      # ── Download and merge raw results from all three browser jobs ────────────
      - name: Download Allure results (chromium)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-chromium
          path: allure-results

      - name: Download Allure results (firefox)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-firefox
          path: allure-results

      - name: Download Allure results (webkit)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-webkit
          path: allure-results

      # ── Generate the Allure HTML report ───────────────────────────────────────
      - name: Generate Allure report
        run: npm run allure:generate

      # ── Persist history for the next run ─────────────────────────────────────
      # The history/ folder inside allure-report/ is saved as its own artifact
      # and downloaded at the start of the next run (step above).
      - name: Save Allure history for next run
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-history
          path: allure-report/history/
          retention-days: 90

      # ── Upload the full rendered HTML report as a downloadable artifact ───────
      - name: Upload Allure HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      # ── Write a rich Job Summary visible directly in the Actions UI ───────────
      # No external service required — the summary is always readable at
      #   Actions → <run> → Summary
      # without downloading anything.
      - name: Write Job Summary
        if: always()
        run: |
          node - <<'EOF'
          const fs   = require('fs');
          const path = require('path');

          const dir = 'allure-results';
          const files = fs.readdirSync(dir).filter(f => f.endsWith('-result.json'));

          const results = files
            .map(f => { try { return JSON.parse(fs.readFileSync(path.join(dir, f), 'utf8')); } catch { return null; } })
            .filter(Boolean);

          const count = s => results.filter(r => r.status === s).length;
          const passed  = count('passed');
          const failed  = count('failed');
          const broken  = count('broken');
          const skipped = count('skipped');
          const total   = results.length;
          const ok      = failed + broken === 0;

          const getLabel = (r, name) => (r.labels || []).find(l => l.name === name)?.value || '—';

          let md = `## ${ok ? '✅' : '❌'} E2E Test Results — run #${process.env.GITHUB_RUN_NUMBER}\n\n`;
          md += `| ✅ Passed | ❌ Failed | 💥 Broken | ⏭ Skipped | Total |\n`;
          md += `|----------|----------|----------|----------|-------|\n`;
          md += `| ${passed} | ${failed} | ${broken} | ${skipped} | **${total}** |\n\n`;

          const failedTests = results.filter(r => r.status === 'failed' || r.status === 'broken');
          if (failedTests.length) {
            md += `### Failed / Broken Tests\n\n`;
            md += `| Test | Suite | Message |\n|------|-------|---------|\n`;
            failedTests.forEach(r => {
              const suite = getLabel(r, 'suite');
              const msg   = (r.statusDetails?.message || '').replace(/\n/g, ' ').substring(0, 120);
              md += `| ${r.name} | ${suite} | \`${msg}\` |\n`;
            });
            md += '\n';
          }

          md += `> 📦 **Full interactive Allure report**: download the \`allure-report\` artifact from this run and open \`index.html\`.\n`;

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md);
          console.log('Job summary written.');
          EOF
