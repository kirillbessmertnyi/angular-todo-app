name: E2E Tests & Allure Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: run tests and collect results
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: Playwright E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false        # all browsers run even if one fails
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (${{ matrix.browser }})
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests
        # continue-on-error lets the workflow proceed to report generation
        # even when tests fail — the exit code is captured via outcome below.
        run: npx playwright test --project=${{ matrix.browser }}
        continue-on-error: true
        env:
          CI: true
        id: tests

      # Raw Allure XML — collected per browser, merged in the report job
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 5

      # Playwright traces are only useful on failure
      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: steps.tests.outcome == 'failure'
        with:
          name: playwright-traces-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

      # Fail the job AFTER artifacts are saved, so CI status is meaningful
      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: merge results, generate report, publish to GitHub Pages
  # ─────────────────────────────────────────────────────────────────────────────
  report:
    name: Generate & Publish Allure Report
    runs-on: ubuntu-latest
    needs: e2e
    # Run even when tests fail so the report is always available
    if: always()

    permissions:
      contents: write   # needed to push to gh-pages branch
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Restore Allure history from the previous gh-pages deployment ──────────
      # This powers the "Trend" and "History" graphs in the Allure dashboard.
      - name: Restore Allure history
        uses: actions/checkout@v4
        continue-on-error: true   # first run: gh-pages branch doesn't exist yet
        with:
          ref: gh-pages
          path: gh-pages-prev

      - name: Copy history into allure-results
        continue-on-error: true
        run: |
          mkdir -p allure-results
          if [ -d gh-pages-prev/history ]; then
            cp -r gh-pages-prev/history allure-results/history
            echo "Allure history restored from previous run."
          else
            echo "No previous history found — first run."
          fi

      # ── Download and merge results from all browser jobs ─────────────────────
      - name: Download Allure results (chromium)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-chromium
          path: allure-results

      - name: Download Allure results (firefox)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-firefox
          path: allure-results

      - name: Download Allure results (webkit)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-webkit
          path: allure-results

      # ── Generate the HTML report ──────────────────────────────────────────────
      - name: Generate Allure report
        run: npm run allure:generate

      # ── Add a simple index redirect so the Pages root goes to the report ──────
      - name: Create Pages root index
        run: |
          cat > allure-report/index-redirect.html <<'EOF'
          <!doctype html>
          <html><head>
          <meta http-equiv="refresh" content="0;url=./index.html">
          </head><body>Redirecting…</body></html>
          EOF

      # ── Upload the rendered report as a downloadable artifact (always) ────────
      - name: Upload Allure HTML report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      # ── Deploy to GitHub Pages (main branch only) ─────────────────────────────
      # The live report is accessible at:
      #   https://<owner>.github.io/<repo>/
      # Enable Pages in repo Settings → Pages → Source: Deploy from branch → gh-pages
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          commit_message: |
            chore: update Allure report [run ${{ github.run_number }}]
